<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Premium Course Access</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.tads.me/widget.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --success: #10b981;
            --btn-bg: #e5e7eb;
            --btn-text: #374151;
            --item-bg: #f9fafb;
            --border-color: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .progress-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-muted);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Task List Styles */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .task-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item.completed {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.05);
        }

        .task-info-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e7ff;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .task-item.completed .task-icon {
            background: #d1fae5;
            color: var(--success);
        }

        .task-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .task-reward {
            font-size: 12px;
            font-weight: 500;
            color: #f59e0b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Buttons */
        .task-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-btn:not(:disabled):hover {
            background: #d1d5db;
        }

        .task-btn.done {
            background: transparent;
            color: var(--success);
            font-size: 15px;
            pointer-events: none;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .main-btn.disabled {
            background: var(--btn-bg);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .main-btn.active {
            background: var(--success);
            color: white;
            box-shadow: 0 8px 20px -6px rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* === TGB Ad Container Styles === */
        .tgb-ad-wrapper {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tgb-ad-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        #tads-container-9637 {
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Prevent layout shift while ad loads */
        #tads-container-9637:empty {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <h1>Getting Started</h1>
            <span class="progress-text" id="progress-text">0/2</span>
        </div>
        <p class="subtitle">Complete the tasks below to get your free course link.</p>

        <div class="task-list">
            <div class="task-item" id="task1">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon1">🎬</div>
                    <div>
                        <div class="task-title">Watch First Ad</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad1" onclick="watchAd(1)">Start</button>
            </div>

            <div class="task-item disabled" id="task2">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon2">🎬</div>
                    <div>
                        <div class="task-title">Watch Second Ad</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad2" onclick="watchAd(2)" disabled>Start</button>
            </div>
        </div>

        <button class="main-btn disabled" id="btn-final" onclick="goToCourse()" disabled>
            🔒 Complete tasks to unlock
        </button>

        <div class="tgb-ad-wrapper">
            <span class="tgb-ad-label">Sponsored</span>
            <div id="tads-container-9637"></div>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }

        // TADS Configuration
        const FULLSCREEN_WIDGET_ID = "9607";
        const TGB_WIDGET_ID = "9637";
        const AD_TYPE_FULLSCREEN = "fullscreen";
        const AD_TYPE_TGB = "static";
        
        let fullscreenAdController = null;
        let tgbAdController = null;

        // Task State
        let currentStep = 1;
        let isAdPlaying = false;

        // Retrieve Course URL
        function getCourseUrl() {
            const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
            if (!code) return 'https://www.udemy.com/';
            try {
                const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
                return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
            } catch (e) { return 'https://www.udemy.com/'; }
        }
        const COURSE_URL = getCourseUrl();

        // Initialize Ads on Page Load
        window.addEventListener('load', () => {
            initFullscreenAd();
            initTGBAd();
        });

        // Initialize Fullscreen Ad
        function initFullscreenAd() {
            let checkTads = setInterval(() => {
                if (window.tads && typeof window.tads.init === 'function') {
                    clearInterval(checkTads);
                    fullscreenAdController = window.tads.init({
                        widgetId: FULLSCREEN_WIDGET_ID,
                        type: AD_TYPE_FULLSCREEN,
                        debug: false,
                        onShowReward: () => handleAdSuccess(),
                        onAdsNotFound: () => handleAdFallback(),
                        onError: (err) => {
                            console.error("Fullscreen Ad Error:", err);
                            resetButtonState();
                        }
                    });
                }
            }, 100);
        }

        // Initialize TGB Ad (Static Type)
        function initTGBAd() {
            const adsNotFoundCallback = () => {
                console.log('TGB: No ads found to show');
                // Hide the container if there is no ad
                const container = document.getElementById(`tads-container-${TGB_WIDGET_ID}`);
                if (container) container.style.display = 'none';
            };

            function initTGBController() {
                if (!window.tads || typeof window.tads.init !== 'function') return;
                
                tgbAdController = window.tads.init({
                    widgetId: TGB_WIDGET_ID,
                    type: AD_TYPE_TGB, 
                    debug: false,
                    onAdsNotFound: adsNotFoundCallback
                });

                // Load and show the TGB ad
                if (tgbAdController && typeof tgbAdController.loadAd === 'function') {
                    tgbAdController.loadAd()
                        .then(() => tgbAdController.showAd())
                        .catch((err) => {
                            console.log("TGB Ad load error:", err);
                            adsNotFoundCallback();
                        });
                }
            }

            // Check if tads is ready, otherwise wait
            if (window.tads && window.tads.init) {
                initTGBController();
            } else {
                let tadsInterval = setInterval(() => {
                    if (window.tads && window.tads.init) {
                        clearInterval(tadsInterval);
                        initTGBController();
                    }
                }, 100);
            }
        }

        // Trigger Fullscreen Ad tied to the button
        function watchAd(stepNumber) {
            if (stepNumber !== currentStep || isAdPlaying) return;

            isAdPlaying = true;
            let btn = document.getElementById(`btn-ad${stepNumber}`);

            // Change button state to loading
            btn.innerText = "⏳ Wait";
            btn.disabled = true;

            if (fullscreenAdController) {
                fullscreenAdController.showAd().catch((err) => {
                    console.error("Failed to display fullscreen ad:", err);
                    handleAdFallback();
                });
            } else {
                handleAdFallback();
            }
        }

        // Success Handler (When fullscreen ad finishes)
        function handleAdSuccess() {
            isAdPlaying = false;

            let currentBtn = document.getElementById(`btn-ad${currentStep}`);
            let currentItem = document.getElementById(`task${currentStep}`);
            let currentIcon = document.getElementById(`icon${currentStep}`);

            currentBtn.innerText = "✅";
            currentBtn.classList.add('done');
            currentItem.classList.add('completed');
            currentIcon.innerText = "✓";

            document.getElementById('progress-text').innerText = `${currentStep}/2`;

            currentStep++;

            if (currentStep === 2) {
                let nextBtn = document.getElementById('btn-ad2');
                let nextItem = document.getElementById('task2');
                nextItem.classList.remove('disabled');
                nextBtn.disabled = false;
            } else if (currentStep > 2) {
                let finalBtn = document.getElementById('btn-final');
                finalBtn.classList.remove('disabled');
                finalBtn.classList.add('active');
                finalBtn.disabled = false;
                finalBtn.innerHTML = "🚀 Enter Course Now";
            }
        }

        // Fallback skip if ads are unavailable
        function handleAdFallback() {
            console.warn("Using fallback skip due to unavailable ad");
            setTimeout(() => {
                handleAdSuccess();
            }, 1000);
        }

        // Reset button state if ad is closed prematurely
        function resetButtonState() {
            isAdPlaying = false;
            let btn = document.getElementById(`btn-ad${currentStep}`);
            btn.innerText = "Start";
            btn.disabled = false;
        }

        // Open final course link
        function goToCourse() {
            if (tg?.openLink) {
                tg.openLink(COURSE_URL);
                setTimeout(() => tg.close(), 1000);
            } else {
                window.location.href = COURSE_URL;
            }
        }
    </script>
</body>
</html>
