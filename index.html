<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DataPi — Free Download</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.8);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --success: #10b981;
      --text-main: #f9fafb;
      --text-dim: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 0% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden;
    }

    .container {
      width: 100%; max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 14px; border-radius: 99px;
      font-size: 12px; font-weight: 600; color: var(--accent);
      margin-bottom: 20px; border: 1px solid rgba(139, 92, 246, 0.2);
      transition: all 0.4s ease;
    }

    .timer-circle {
      position: relative; width: 100px; height: 100px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
    }

    .timer-text {
      font-size: 32px; font-weight: 800; color: var(--text-main);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .icon-display {
      font-size: 50px; display: none;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }

    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
    p  { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    /* File info area */
    .file-info {
      display: none;
      margin-bottom: 20px;
    }
    .file-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: #a78bfa;
      background: rgba(108, 99, 255, 0.13);
      border: 1px solid rgba(108, 99, 255, 0.22);
      border-radius: 7px; padding: 3px 9px;
      margin-bottom: 8px;
    }
    .file-title-text {
      font-size: 17px; font-weight: 800; letter-spacing: -0.3px;
      color: var(--text-main); word-break: break-word;
      margin-bottom: 8px; display: block;
    }
    .free-tag {
      font-size: 11px; font-weight: 700;
      color: #10b981;
      background: rgba(16, 185, 129, 0.10);
      border: 1px solid rgba(16, 185, 129, 0.22);
      border-radius: 99px; padding: 3px 10px;
      display: inline-block;
    }

    /* Chips */
    .chips-row {
      display: none;
      gap: 7px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 20px;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-dim);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 99px; padding: 5px 11px;
    }

    /* Buttons */
    .btn {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white; box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.5);
    }
    .btn-primary:disabled {
      background: #374151; color: #9ca3af; box-shadow: none; cursor: not-allowed;
    }
    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.5);
      display: none;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }

    /* Progress */
    .progress-container {
      width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05);
      border-radius: 10px; margin-top: 20px; display: none;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 10px; transition: width 0.3s ease;
    }

    /* Footer */
    .footer-note {
      margin-top: 24px; font-size: 11px; color: var(--text-dim);
      opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    /* Pulse ring */
    .pulse-ring {
      position: absolute; width: 100%; height: 100%;
      border: 2px solid var(--accent); border-radius: 50%;
      animation: ripple 2s infinite; opacity: 0;
    }
    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container" id="main-card">

  <div class="status-badge" id="status-box">
    <span id="status-dot" style="width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;"></span>
    <span id="status-text">SYSTEM INITIALIZING</span>
  </div>

  <div class="timer-circle">
    <div class="pulse-ring" id="pulse-effect"></div>
    <div class="timer-text" id="countdown">7</div>
    <div class="icon-display" id="success-icon">📥</div>
    <div class="icon-display" id="ad-icon">🎬</div>
  </div>

  <!-- File info (populated from URL params) -->
  <div class="file-info" id="file-info">
    <div class="file-type-badge" id="type-badge">📁 File</div>
    <span class="file-title-text" id="file-title">Your File</span>
    <span class="free-tag">✦ 100% Free</span>
  </div>

  <h1 id="title">Verifying Connection</h1>
  <p id="description">We are searching for the best available offers to unlock your file for free.</p>

  <!-- Chips (shown after init) -->
  <div class="chips-row" id="chips-row">
    <span class="chip">✅ No signup</span>
    <span class="chip">✅ No payment</span>
    <span class="chip" id="chip-size">⏱ ~15 sec ad</span>
  </div>

  <button class="btn btn-primary" id="btn-watch" onclick="handleWatchAd()" disabled>
    <span id="btn-text">Checking Offers…</span>
  </button>

  <button class="btn btn-success" id="btn-download" onclick="goToDataset()">
    <span>📥</span><span>Download — Free ✓</span>
  </button>

  <div class="progress-container" id="progress-wrap">
    <div class="progress-fill" id="progress-bar"></div>
  </div>

  <div class="footer-note">
    <span>🛡️</span>&nbsp;Powered by DataPi · @DATASCIENCEQ
  </div>

</div>

<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  /* ── Decode params ── */
  function decodeB64(str) {
    if (!str) return null;
    try {
      const p = str + '=='.slice(0, (4 - str.length % 4) % 4);
      return atob(p.replace(/-/g, '+').replace(/_/g, '/'));
    } catch { return null; }
  }

  const params      = new URLSearchParams(window.location.search);
  const startParam  = tg?.initDataUnsafe?.start_param
                    || params.get('startapp')
                    || params.get('tgWebAppStartParam');
  const _decoded    = decodeB64(startParam) || '';
  const _pipeIdx    = _decoded.indexOf('|');
  const DATASET_URL = _pipeIdx === -1 ? (_decoded || null) : (_decoded.slice(0, _pipeIdx) || null);

  const rawTitle   = params.get('title');
  const PAGE_TITLE = rawTitle ? (decodeB64(rawTitle) || decodeURIComponent(rawTitle)) : null;

  /* ── File type detection ── */
  function detectBadge(url) {
    if (!url) return { emoji: '📁', label: 'File' };
    const u = url.toLowerCase();
    if (u.includes('.pdf'))                   return { emoji: '📕', label: 'PDF Book' };
    if (u.match(/\.(mp4|mkv|avi|mov|webm)/)) return { emoji: '🎬', label: 'Video' };
    if (u.match(/\.(mp3|wav|ogg|flac|m4a)/)) return { emoji: '🎧', label: 'Audio' };
    if (u.match(/\.(zip|rar|7z|tar|gz)/))    return { emoji: '🗜', label: 'Archive' };
    if (u.match(/\.(csv|xlsx|xls)/))         return { emoji: '📊', label: 'Dataset' };
    return { emoji: '📁', label: 'File' };
  }

  function fmtBytes(n) {
    const units = ['B', 'KB', 'MB', 'GB'];
    for (const u of units) { if (n < 1024) return n.toFixed(1) + ' ' + u; n /= 1024; }
    return n.toFixed(1) + ' TB';
  }

  function populateFileUI() {
    const badge = detectBadge(DATASET_URL);

    // Title
    const titleEl = document.getElementById('file-title');
    if (PAGE_TITLE) {
      titleEl.textContent = PAGE_TITLE;
    } else if (DATASET_URL) {
      const parts = DATASET_URL.split('/');
      titleEl.textContent = decodeURIComponent(parts[parts.length - 1] || 'Dataset');
    }

    document.getElementById('type-badge').textContent    = badge.emoji + ' ' + badge.label;
    document.getElementById('file-info').style.display   = 'block';
    document.getElementById('chips-row').style.display   = 'flex';

    // Pixeldrain file size
    if (DATASET_URL) {
      const m = DATASET_URL.match(/pixeldrain\.com\/u\/([a-zA-Z0-9]+)/);
      if (m) {
        fetch(`https://pixeldrain.com/api/file/${m[1]}/info`)
          .then(r => r.json())
          .then(d => { if (d.size) document.getElementById('chip-size').textContent = '💾 ' + fmtBytes(d.size); })
          .catch(() => {});
      }
    }
  }

  /* ── RichAds SDK ── */
  let adsCtrl       = null;
  let adUnlocked    = false;
  let checkAttempts = 0;
  const MAX_ATTEMPTS = 14;
  let checkInterval  = null;

  window.addEventListener('load', () => {
    populateFileUI();

    if (typeof TelegramAdsController !== 'undefined') {
      try {
        adsCtrl = new TelegramAdsController();
        adsCtrl.initialize({ pubId: "1006337", appId: "7003" });
      } catch (e) { console.warn('Ads init failed:', e); }
    }

    checkInterval = setInterval(updateLogic, 500);
  });

  function updateLogic() {
    checkAttempts++;
    const secondsLeft = Math.ceil((MAX_ATTEMPTS - checkAttempts) / 2);
    if (secondsLeft >= 0 && !adUnlocked) {
      document.getElementById('countdown').innerText = secondsLeft;
    }

    let isAvailable = false;
    if (adsCtrl) {
      const checkFn = adsCtrl.isAdAvailable ?? adsCtrl.isReady ?? null;
      try { if (checkFn) isAvailable = checkFn.call(adsCtrl); } catch (e) {}
    }

    if (isAvailable) {
      clearInterval(checkInterval);
      showAdReadyState();
      return;
    }

    if (checkAttempts >= MAX_ATTEMPTS) {
      clearInterval(checkInterval);
      unlockDirectly();
    }
  }

  function showAdReadyState() {
    document.getElementById('countdown').style.display = 'none';
    document.getElementById('ad-icon').style.display   = 'block';
    document.getElementById('status-text').innerText   = 'OFFER FOUND';
    document.getElementById('title').innerText         = 'Unlock Your Download';
    document.getElementById('description').innerText   = 'Watch a short sponsored video to unlock your free download instantly.';

    const btn = document.getElementById('btn-watch');
    btn.disabled = false;
    document.getElementById('btn-text').innerText = '▶  Watch Ad to Unlock';
  }

  async function handleWatchAd() {
    const btn = document.getElementById('btn-watch');
    btn.disabled = true;
    document.getElementById('btn-text').innerText = 'Loading ad…';

    document.getElementById('progress-wrap').style.display = 'block';
    let p = 0;
    const pIv = setInterval(() => { p += 2; if (p <= 95) document.getElementById('progress-bar').style.width = p + '%'; }, 200);

    try {
      await adsCtrl.show();
      clearInterval(pIv);
      unlockDirectly();
    } catch (err) {
      clearInterval(pIv);
      const msg = String(err).toLowerCase();
      if (msg.includes('skip') || msg.includes('close')) {
        btn.disabled = false;
        document.getElementById('btn-text').innerText          = '▶  Watch Ad to Unlock';
        document.getElementById('progress-wrap').style.display = 'none';
        alert('Please watch the full ad to unlock your download.');
      } else {
        unlockDirectly();
      }
    }
  }

  function unlockDirectly() {
    adUnlocked = true;

    document.getElementById('countdown').style.display    = 'none';
    document.getElementById('ad-icon').style.display      = 'none';
    document.getElementById('success-icon').style.display = 'block';
    document.getElementById('pulse-effect').style.display = 'none';

    document.getElementById('status-text').innerText              = 'ACCESS GRANTED';
    document.getElementById('status-dot').style.background        = 'var(--success)';
    document.getElementById('status-box').style.borderColor       = 'var(--success)';
    document.getElementById('status-box').style.color             = 'var(--success)';

    document.getElementById('title').innerText       = 'Ready to Download!';
    document.getElementById('description').innerText = 'Verification complete. Your file is ready — tap below to download for free.';

    document.getElementById('btn-watch').style.display    = 'none';
    document.getElementById('progress-wrap').style.display = 'none';
    document.getElementById('btn-download').style.display = 'flex';
  }

  function goToDataset() {
    const url = DATASET_URL || 'https://pixeldrain.com';
    if (tg?.openLink) { tg.openLink(url); setTimeout(() => tg.close(), 600); }
    else window.location.href = url;
  }
</script>
</body>
</html>
