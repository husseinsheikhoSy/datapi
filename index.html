<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Premium Course Access</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- ✅ RichAds Script (للزر الأول) -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "1006337",
            appId: "7003",  // ✅ إعدادات RichAds
        });
    </script>
    
    <!-- ✅ tads.me Script (للزر الثاني + الإعلان السفلي) -->
    <script src="https://w.tads.me/widget.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        :root {
            /* 🎨 Reddit-inspired Color Scheme */
            --bg-body: #dae0e6;
            --bg-card: #ffffff;
            --text-main: #1c1c1c;
            --text-muted: #7c7c7c;
            --primary: #ff4500;        /* ✅ Reddit Orange */
            --primary-hover: #e03d00;
            --primary-light: #ff6b35;
            --success: #46d160;         /* ✅ Reddit Green */
            --success-hover: #3dc154;
            --btn-bg: #edeff1;
            --btn-text: #1c1c1c;
            --btn-hover: #dcdee1;
            --item-bg: #f8f9fa;
            --border-color: #ccc;
            --border-light: #e6e6e6;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --upvote-color: #ff4500;
            --link-color: #0079d3;      /* ✅ Reddit Blue */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 8px;           /* ✅ Reddit-style rounded corners */
            padding: 24px;
            box-shadow: 0 1px 4px var(--shadow-color);
            border: 1px solid var(--border-color);
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--btn-bg);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            border: 1px solid var(--border-light);
            border-radius: 4px;           /* ✅ Reddit-style sharp corners */
            padding: 12px 14px;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            border-color: var(--primary);
        }

        .task-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item.completed {
            border-color: var(--success);
            background: rgba(70, 209, 96, 0.08);
        }

        .task-info-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid var(--border-light);
        }

        .task-item.completed .task-icon {
            background: var(--success);
            color: white;
            border-color: var(--success-hover);
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .task-reward {
            font-size: 11px;
            font-weight: 500;
            color: var(--upvote-color);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .task-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 99px;          /* ✅ Reddit pill buttons */
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .task-btn:not(:disabled):hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .task-btn:active {
            transform: translateY(0);
        }

        .task-btn.done {
            background: transparent;
            color: var(--success);
            font-size: 14px;
            pointer-events: none;
            border: 2px solid var(--success);
            border-radius: 99px;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            border-radius: 99px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .main-btn.disabled {
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: not-allowed;
            border: 1px solid var(--border-light);
        }

        .main-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .main-btn.active:hover {
            background: var(--primary-hover);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 69, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0); }
        }

        .tgb-ad-wrapper {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tgb-ad-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            background: var(--btn-bg);
            padding: 2px 8px;
            border-radius: 4px;
        }

        #tads-container-9637 {
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tads-container-9637:empty {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <h1>Getting Started</h1>
            <span class="progress-text" id="progress-text">0/2</span>
        </div>
        <p class="subtitle">Complete the tasks below to get your free book link.</p>

        <div class="task-list">
            <!-- ✅ الزر الأول: RichAds -->
            <div class="task-item" id="task1">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon1">🎬</div>
                    <div>
                        <div class="task-title">Watch First Ad (RichAds)</div>
                        <div class="task-reward">▲ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad1" onclick="watchAd(1)">Start</button>
            </div>

            <!-- ✅ الزر الثاني: tads.me Fullscreen -->
            <div class="task-item disabled" id="task2">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon2">🎬</div>
                    <div>
                        <div class="task-title">Watch Second Ad (Tads)</div>
                        <div class="task-reward">▲ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad2" onclick="watchAd(2)" disabled>Start</button>
            </div>
        </div>

        <button class="main-btn disabled" id="btn-final" onclick="goToCourse()" disabled>
            🔒 Complete tasks to unlock
        </button>

        <!-- ✅ إعلان TGB السفلي -->
        <div class="tgb-ad-wrapper">
            <span class="tgb-ad-label">Sponsored</span>
            <div id="tads-container-9637"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }

        // ⚙️ إعدادات Tads (للزر الثاني والإعلان السفلي)
        const FULLSCREEN_WIDGET_ID = "9607";
        const TGB_WIDGET_ID = "9637";
        const AD_TYPE_FULLSCREEN = "fullscreen";
        const AD_TYPE_TGB = "static";
        
        let fullscreenAdController = null;
        let tgbAdController = null;
        let currentStep = 1;
        let isAdPlaying = false;

        function getCourseUrl() {
            const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
            if (!code) return 'https://www.udemy.com/';
            try {
                const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
                return decoded.startsWith('http') ? decoded : 'https://www.udemy.com/';
            } catch (e) { return 'https://www.udemy.com/'; }
        }
        const COURSE_URL = getCourseUrl();

        window.addEventListener('load', () => {
            initTadsFullscreen();
            initTGBAd();
        });

        // ✅ تهيئة Tads Fullscreen (للزر الثاني فقط)
        function initTadsFullscreen() {
            let checkTads = setInterval(() => {
                if (window.tads && typeof window.tads.init === 'function') {
                    clearInterval(checkTads);
                    fullscreenAdController = window.tads.init({
                        widgetId: FULLSCREEN_WIDGET_ID,
                        type: AD_TYPE_FULLSCREEN,
                        debug: false,
                        onShowReward: () => handleAdSuccess(),
                        onAdsNotFound: () => handleAdFallback(),
                        onError: (err) => {
                            console.error("Tads Fullscreen Error:", err);
                            resetButtonState();
                        }
                    });
                }
            }, 100);
        }

        // ✅ تهيئة TGB Ad (للقسم السفلي)
        function initTGBAd() {
            const adsNotFoundCallback = () => {
                console.log('TGB: No ads found to show');
                const container = document.getElementById(`tads-container-${TGB_WIDGET_ID}`);
                if (container) container.style.display = 'none';
            };

            function initTGBController() {
                if (!window.tads || typeof window.tads.init !== 'function') return;
                
                tgbAdController = window.tads.init({
                    widgetId: TGB_WIDGET_ID,
                    type: AD_TYPE_TGB,
                    debug: false,
                    onAdsNotFound: adsNotFoundCallback
                });

                if (tgbAdController && typeof tgbAdController.loadAd === 'function') {
                    tgbAdController.loadAd()
                        .then(() => tgbAdController.showAd())
                        .catch((err) => {
                            console.log("TGB Ad load error:", err);
                            adsNotFoundCallback();
                        });
                }
            }

            if (window.tads && window.tads.init) {
                initTGBController();
            } else {
                let tadsInterval = setInterval(() => {
                    if (window.tads && window.tads.init) {
                        clearInterval(tadsInterval);
                        initTGBController();
                    }
                }, 100);
            }
        }

        // 🎯 الدالة الرئيسية لمشاهدة الإعلان
        function watchAd(stepNumber) {
            if (stepNumber !== currentStep || isAdPlaying) return;
            isAdPlaying = true;
            let btn = document.getElementById(`btn-ad${stepNumber}`);
            btn.innerText = "⏳ Wait";
            btn.disabled = true;

            if (stepNumber === 1) {
                // ✅ الزر الأول: RichAds
                showRichAds();
            } else if (stepNumber === 2) {
                // ✅ الزر الثاني: Tads.me Fullscreen
                if (fullscreenAdController) {
                    fullscreenAdController.showAd().catch((err) => {
                        console.error("Failed to display fullscreen ad:", err);
                        handleAdFallback();
                    });
                } else {
                    handleAdFallback();
                }
            }
        }

        // ✅ دالة عرض إعلان RichAds (للزر الأول)
        function showRichAds() {
            if (window.TelegramAdsController && typeof window.TelegramAdsController.showAd === 'function') {
                try {
                    window.TelegramAdsController.showAd({
                        onAdWatched: function() {
                            console.log("RichAds: Ad watched successfully");
                            handleAdSuccess();
                        },
                        onReward: function() {
                            console.log("RichAds: Reward granted");
                            handleAdSuccess();
                        },
                        onError: function(err) {
                            console.error("RichAds Error:", err);
                            handleAdFallback(); 
                        },
                        onClose: function() {
                            setTimeout(() => {
                                if (isAdPlaying) {
                                    console.warn("RichAds: Ad closed without reward callback");
                                    resetButtonState();
                                }
                            }, 1000);
                        }
                    });
                } catch (e) {
                    console.error("RichAds initialization error:", e);
                    handleAdFallback();
                }
            } else {
                console.warn("RichAds controller not ready, using fallback");
                handleAdFallback();
            }
        }

        // ✅ معالجة نجاح الإعلان (مشتركة)
        function handleAdSuccess() {
            if (!isAdPlaying) return;
            isAdPlaying = false;
            
            let currentBtn = document.getElementById(`btn-ad${currentStep}`);
            let currentItem = document.getElementById(`task${currentStep}`);
            let currentIcon = document.getElementById(`icon${currentStep}`);

            currentBtn.innerText = "✓";
            currentBtn.classList.add('done');
            currentItem.classList.add('completed');
            currentIcon.innerText = "✓";

            document.getElementById('progress-text').innerText = `${currentStep}/2`;
            currentStep++;

            if (currentStep === 2) {
                let nextBtn = document.getElementById('btn-ad2');
                let nextItem = document.getElementById('task2');
                nextItem.classList.remove('disabled');
                nextBtn.disabled = false;
            } else if (currentStep > 2) {
                let finalBtn = document.getElementById('btn-final');
                finalBtn.classList.remove('disabled');
                finalBtn.classList.add('active');
                finalBtn.disabled = false;
                finalBtn.innerHTML = "🚀 Download Book Now";
            }
        }

        // ⚠️ آلية احتياطية في حال فشل الإعلان
        function handleAdFallback() {
            console.warn("Using fallback skip due to unavailable ad or error");
            setTimeout(() => {
                handleAdSuccess();
            }, 1500);
        }

        // 🔁 إعادة زر الإعلان لحالته عند الخطأ
        function resetButtonState() {
            isAdPlaying = false;
            let btn = document.getElementById(`btn-ad${currentStep}`);
            if (btn) {
                btn.innerText = "Start";
                btn.disabled = false;
            }
        }

        function goToCourse() {
            if (tg?.openLink) {
                tg.openLink(COURSE_URL);
                setTimeout(() => tg.close(), 1000);
            } else {
                window.location.href = COURSE_URL;
            }
        }
    </script>
</body>
</html>
