<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DataPi26 — Free File Access</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://w.tads.me/widget.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --brand-red:      #d52b1e;
      --brand-red-dark: #a3160c;
      --brand-red-light:#ff7a6e;
      --bg:             #fafafa;
      --card:           #ffffff;
      --text:           #1c1d1f;
      --text-muted:     #6a6f73;
      --border:         #f0dedd;
      --step-done-bg:   #e6f4ea;
      --step-done-text: #1e7e34;
      --radius-card:    20px;
      --radius-btn:     10px;
      --shadow-card:    0 4px 24px rgba(213,43,30,.12);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Mulish', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 32px;
      overflow-x: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      width: 100%;
      background: var(--brand-red);
      padding: 14px 20px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-u {
      width: 32px; height: 32px; border-radius: 6px;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: var(--brand-red);
      flex-shrink: 0;
    }
    .logo-text { font-size: 15px; font-weight: 800; color: #fff; }
    .badge-free {
      margin-left: auto;
      background: #ffffff; color: var(--brand-red);
      font-size: 11px; font-weight: 800;
      padding: 4px 10px; border-radius: 20px;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      display: none;
      width: calc(100% - 28px); max-width: 440px;
      margin: 20px auto 0;
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 22px 20px;
    }
    .skeleton.visible { display: block; }
    .skel-line {
      background: linear-gradient(90deg, #f0dedd 25%, #faf3f2 50%, #f0dedd 75%);
      background-size: 200% 100%;
      border-radius: 6px; margin-bottom: 10px;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-thumb { width: 64px; height: 64px; border-radius: 10px; flex-shrink: 0; }
    .skel-row { display: flex; gap: 12px; margin-bottom: 18px; }
    .skel-lines { flex: 1; }

    /* ── Main card ── */
    .card {
      width: calc(100% - 28px); max-width: 440px;
      margin: 20px auto 0;
      background: var(--card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 22px 20px 20px;
      animation: slideUp .45s cubic-bezier(.22,.61,.36,1) both;
      display: none;
    }
    .card.visible { display: block; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── File info ── */
    .file-info {
      display: flex; gap: 12px;
      margin-bottom: 18px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .file-thumb {
      width: 64px; height: 64px; border-radius: 10px;
      background: linear-gradient(135deg, var(--brand-red), var(--brand-red-dark));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; overflow: hidden;
    }
    .file-thumb img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
    .file-meta { flex:1; min-width:0; }
    .file-title {
      font-size: 14px; font-weight: 800; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .file-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .tag {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 5px;
      background: #fde6e4; color: var(--brand-red);
    }
    .tag.free-tag { background: var(--brand-red); color: #fff; }
    .file-size-row { font-size: 12px; font-weight: 800; margin-top: 6px; color: var(--text-muted); }

    /* ── Headline ── */
    .unlock-headline { text-align: center; margin-bottom: 6px; }
    .unlock-headline h2 { font-size: 17px; font-weight: 900; color: var(--text); line-height: 1.3; }
    .unlock-headline p  { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

    /* ── Progress bar ── */
    .progress-wrap { margin: 14px 0; display: flex; align-items: center; gap: 10px; }
    .progress-bar-bg { flex:1; height:7px; background:var(--border); border-radius:10px; overflow:hidden; }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand-red), var(--brand-red-dark));
      border-radius: 10px; width: 0%;
      transition: width .5s ease;
    }
    .progress-label { font-size:12px; font-weight:800; color:var(--brand-red); min-width:30px; text-align:right; }

    /* ── Steps ── */
    .steps { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
    .step {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
      transition: border-color .3s, background .3s;
    }
    .step.locked { opacity:.5; pointer-events:none; }
    .step.done   { border-color:#c3e6cb; background:var(--step-done-bg); }

    .step-num {
      width: 36px; height: 36px; border-radius: 50%;
      background: #fde6e4; color: var(--brand-red);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 900; flex-shrink: 0;
      transition: background .3s, color .3s;
      position: relative;
    }
    .step.done .step-num { background:var(--step-done-text); color:#fff; font-size:18px; }

    /* countdown ring */
    .countdown-ring {
      position: absolute; top: 0; left: 0;
      width: 36px; height: 36px;
      transform: rotate(-90deg);
      pointer-events: none;
      opacity: 0; transition: opacity .2s;
    }
    .countdown-ring.active { opacity: 1; }
    .countdown-ring circle {
      fill: none; stroke: var(--brand-red-dark);
      stroke-width: 3;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      stroke-linecap: round;
      transition: stroke-dashoffset .95s linear;
    }

    .step-body { flex:1; min-width:0; }
    .step-title { font-size:14px; font-weight:800; color:var(--text); }
    .step.done .step-title { color:var(--step-done-text); }
    .step-sub   { font-size:11px; color:var(--text-muted); margin-top:2px; }

    .step-btn {
      background: var(--brand-red); color: #fff; border: none;
      border-radius: var(--radius-btn); padding: 8px 16px;
      font-size: 13px; font-weight: 800;
      cursor: pointer; flex-shrink: 0;
      transition: background .2s, transform .1s;
      min-width: 68px; text-align: center;
    }
    .step-btn:active  { transform: scale(.96); }
    .step-btn:disabled { background: #f2c5c1; cursor: not-allowed; }
    .step-btn.watching { background: #f59e0b; pointer-events: none; }
    .step-btn.done-mark {
      background: transparent; color: var(--step-done-text);
      font-size: 20px; pointer-events: none; padding: 0 12px;
    }

    /* ── CTA ── */
    .cta-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      font-size: 16px; font-weight: 900; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .3s;
    }
    .cta-btn.locked  { background:var(--border); color:var(--text-muted); cursor:not-allowed; }
    .cta-btn.unlocked {
      background: linear-gradient(135deg, var(--brand-red), var(--brand-red-dark));
      color: #fff;
      box-shadow: 0 6px 18px -4px rgba(213,43,30,.6);
      animation: pulseRed 2.2s infinite;
    }
    @keyframes pulseRed {
      0%  { box-shadow: 0 0 0 0   rgba(213,43,30,.45); }
      60% { box-shadow: 0 0 0 12px rgba(213,43,30,0);  }
      100%{ box-shadow: 0 0 0 0   rgba(213,43,30,0);   }
    }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      pointer-events: none;
      z-index: 999;
      display: none;
    }

    /* ── Success message ── */
    .success-msg {
      display: none;
      text-align: center;
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--step-done-bg);
      border: 1.5px solid #c3e6cb;
      border-radius: 12px;
      font-size: 13px; font-weight: 700;
      color: var(--step-done-text);
      animation: fadeIn .4s ease;
    }
    .success-msg.visible { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

    /* ── TGB ad ── */
    .ad-section {
      width: calc(100% - 28px); max-width: 440px;
      margin: 16px auto 0;
    }
    .ad-label {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .8px;
      text-align: center; margin-bottom: 8px;
    }
    .ad-slot {
      width: 100%; min-height: 80px; border-radius: 14px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: var(--card); box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }
    #tads-container-9637 { width:100%; min-height:80px; display:flex; align-items:center; justify-content:center; }
    #tads-container-9637:empty { display:none; }

    @media (max-width:380px) {
      .card { padding:16px 14px; }
      .step-btn { padding:7px 11px; font-size:12px; }
      .cta-btn { font-size:15px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="logo-u">P</div>
    <span class="logo-text">DataPi26 Free Access</span>
    <span class="badge-free">FREE</span>
  </div>

  <!-- Skeleton loader (shown while JS runs) -->
  <div class="skeleton visible" id="skeleton">
    <div class="skel-row">
      <div class="skel-line skel-thumb"></div>
      <div class="skel-lines">
        <div class="skel-line" style="height:14px;width:80%;"></div>
        <div class="skel-line" style="height:11px;width:55%;margin-top:6px;"></div>
        <div class="skel-line" style="height:11px;width:40%;margin-top:6px;"></div>
      </div>
    </div>
    <div class="skel-line" style="height:16px;width:60%;margin:0 auto 10px;"></div>
    <div class="skel-line" style="height:10px;width:90%;margin:0 auto 18px;"></div>
    <div class="skel-line" style="height:56px;border-radius:14px;"></div>
    <div class="skel-line" style="height:56px;border-radius:14px;"></div>
    <div class="skel-line" style="height:52px;border-radius:14px;margin-top:4px;"></div>
  </div>

  <!-- Main card -->
  <div class="card" id="main-card">

    <div class="file-info">
      <div class="file-thumb" id="file-thumb">📦</div>
      <div class="file-meta">
        <div class="file-title" id="file-title">DataPi26 File</div>
        <div class="file-tags">
          <span class="tag free-tag">100% FREE</span>
          <span class="tag" id="file-cat">File</span>
        </div>
        <div class="file-size-row" id="file-size"></div>
      </div>
    </div>

    <div class="unlock-headline">
      <h2>Unlock Your Free Download</h2>
      <p>Watch 2 short ads to activate your free download link.</p>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">0/2</span>
    </div>

    <div class="steps">
      <!-- Step 1 -->
      <div class="step" id="step-1">
        <div class="step-num" id="num-1">
          1
          <svg class="countdown-ring" id="ring-1" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15" id="ring-circle-1"/>
          </svg>
        </div>
        <div class="step-body">
          <div class="step-title">Watch Ad #1</div>
          <div class="step-sub" id="sub-1">~10 seconds • tads.me</div>
        </div>
        <button class="step-btn" id="btn-1" onclick="startStep(1)">Watch</button>
      </div>

      <!-- Step 2 -->
      <div class="step locked" id="step-2">
        <div class="step-num" id="num-2">
          2
          <svg class="countdown-ring" id="ring-2" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="15" id="ring-circle-2"/>
          </svg>
        </div>
        <div class="step-body">
          <div class="step-title">Watch Ad #2</div>
          <div class="step-sub" id="sub-2">~10 seconds • tads.me</div>
        </div>
        <button class="step-btn" id="btn-2" onclick="startStep(2)" disabled>Watch</button>
      </div>
    </div>

    <button class="cta-btn locked" id="btn-download" disabled>
      🔒 Complete both steps to download
    </button>

    <div class="success-msg" id="success-msg">
      🎉 You're all set! Click above to download.
    </div>

  </div>

  <!-- TGB banner -->
  <div class="ad-section" id="ad-section-wrapper">
    <div class="ad-label">Sponsored</div>
    <div class="ad-slot">
      <div id="tads-container-9637"></div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <script>
  // ── Telegram WebApp ─────────────────────────────────────────
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  // ── Widget IDs (tads.me) ───────────────────────────────────
  const FULLSCREEN_ID_1 = "9607";
  const FULLSCREEN_ID_2 = "9969";
  const TGB_ID          = "9637";
  const AD_DURATION_SEC = 10;   // عدد ثواني الكاونت داون

  // ── File URL decode (startapp = base64 of Pixeldrain direct link) ──
  function getFileUrl() {
    const param = tg?.initDataUnsafe?.start_param
               || new URLSearchParams(window.location.search).get('startapp')
               || new URLSearchParams(window.location.search).get('tgWebAppStartParam');
    if (!param) return 'https://pixeldrain.com/';
    try {
      const b64     = param.replace(/-/g,'+').replace(/_/g,'/');
      const decoded = decodeURIComponent(escape(atob(b64)));
      return decoded.startsWith('http') ? decoded : 'https://pixeldrain.com/';
    } catch(e) { return 'https://pixeldrain.com/'; }
  }

  // ── File meta from URL params ────────────────────────────────
  function loadFileMeta() {
    const p = new URLSearchParams(window.location.search);
    const title = p.get('title'), img = p.get('img'),
          cat   = p.get('cat'),   size = p.get('size');

    if (title) document.getElementById('file-title').textContent = decodeURIComponent(title);
    if (img) {
      const thumb = document.getElementById('file-thumb');
      const decoded = decodeURIComponent(img);
      thumb.innerHTML = `<img src="${decoded}" alt="cover" referrerpolicy="no-referrer"
        onerror="this.parentElement.innerHTML='📦'" />`;
    }
    if (cat)  document.getElementById('file-cat').textContent = decodeURIComponent(cat);
    if (size) document.getElementById('file-size').textContent = '💾 ' + decodeURIComponent(size);
  }

  const FILE_URL = getFileUrl();

  // ── localStorage progress cache (5 min) ─────────────────────
  const CACHE_KEY = 'dp_progress_' + FILE_URL.slice(-20);
  const CACHE_TTL = 5 * 60 * 1000;

  function loadProgress() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (Date.now() - obj.ts > CACHE_TTL) { localStorage.removeItem(CACHE_KEY); return null; }
      return obj;
    } catch(e) { return null; }
  }

  function saveProgress(step1, step2) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ step1, step2, ts: Date.now() }));
    } catch(e) {}
  }

  // ── State ────────────────────────────────────────────────────
  let step1Done = false, step2Done = false;
  let adController1 = null, adController2 = null;
  let adPlaying = false;

  // ── Init ─────────────────────────────────────────────────────
  function waitForTads(cb) {
    if (window.tads && typeof window.tads.init === 'function') { cb(); return; }
    const t = setInterval(() => {
      if (window.tads && typeof window.tads.init === 'function') { clearInterval(t); cb(); }
    }, 80);
  }

  function initAdControllers() {
    adController1 = window.tads.init({
      widgetId: FULLSCREEN_ID_1, type: 'fullscreen', debug: false,
      onShowReward:  () => onAdComplete(1),
      onAdsNotFound: () => onAdFallback(1),
      onError:       () => onAdFallback(1),
    });
    adController2 = window.tads.init({
      widgetId: FULLSCREEN_ID_2, type: 'fullscreen', debug: false,
      onShowReward:  () => onAdComplete(2),
      onAdsNotFound: () => onAdFallback(2),
      onError:       () => onAdFallback(2),
    });
  }

  function initTGBBanner() {
    const ctrl = window.tads.init({
      widgetId: TGB_ID, type: 'static', debug: false,
      onAdsNotFound: hideTGB,
    });
    if (ctrl && typeof ctrl.loadAd === 'function') {
      ctrl.loadAd().then(() => ctrl.showAd()).catch(hideTGB);
    }
  }

  function hideTGB() {
    const el = document.getElementById('ad-section-wrapper');
    if (el) el.style.display = 'none';
  }

  // ── Show skeleton → card transition ─────────────────────────
  function showCard() {
    document.getElementById('skeleton').classList.remove('visible');
    document.getElementById('main-card').classList.add('visible');
  }

  // ── Countdown ring animation ─────────────────────────────────
  function startCountdownRing(n) {
    const ring   = document.getElementById(`ring-${n}`);
    const circle = document.getElementById(`ring-circle-${n}`);
    const btn    = document.getElementById(`btn-${n}`);
    const sub    = document.getElementById(`sub-${n}`);

    const circumference = 2 * Math.PI * 15; // r=15
    circle.style.strokeDasharray  = circumference;
    circle.style.strokeDashoffset = circumference;
    ring.classList.add('active');

    let remaining = AD_DURATION_SEC;
    btn.textContent = remaining;

    const iv = setInterval(() => {
      remaining--;
      const progress = (AD_DURATION_SEC - remaining) / AD_DURATION_SEC;
      circle.style.strokeDashoffset = circumference * (1 - progress);

      if (remaining > 0) {
        btn.textContent = remaining;
        sub.textContent = `${remaining}s remaining…`;
      } else {
        clearInterval(iv);
        btn.textContent = '⏳';
        sub.textContent = 'Loading…';
      }
    }, 1000);

    // store interval id to cancel if ad completes early
    window[`_cd_${n}`] = iv;
  }

  function stopCountdownRing(n) {
    clearInterval(window[`_cd_${n}`]);
    const ring = document.getElementById(`ring-${n}`);
    if (ring) ring.classList.remove('active');
  }

  // ── Start step ───────────────────────────────────────────────
  function startStep(n) {
    if (adPlaying) return;
    if (n === 1 && step1Done) return;
    if (n === 2 && (!step1Done || step2Done)) return;

    adPlaying = true;
    const btn = document.getElementById(`btn-${n}`);
    btn.classList.add('watching');

    startCountdownRing(n);

    const controller = n === 1 ? adController1 : adController2;
    if (!controller) { setTimeout(() => onAdFallback(n), 1200); return; }

    controller.showAd().catch(() => onAdFallback(n));

    // safety net 22s
    window[`_safety_${n}`] = setTimeout(() => {
      if (adPlaying) { console.warn(`Step ${n}: safety net`); onAdComplete(n); }
    }, 22000);
  }

  // ── Ad complete ──────────────────────────────────────────────
  function onAdComplete(n) {
    clearTimeout(window[`_safety_${n}`]);
    stopCountdownRing(n);
    if (!adPlaying) return;
    adPlaying = false;

    const btn  = document.getElementById(`btn-${n}`);
    const step = document.getElementById(`step-${n}`);
    const num  = document.getElementById(`num-${n}`);
    const sub  = document.getElementById(`sub-${n}`);

    btn.classList.remove('watching');
    btn.className = 'step-btn done-mark';
    btn.textContent = '✓';
    step.classList.add('done');
    num.childNodes[0].textContent = '✓';
    sub.textContent = 'Completed ✓';

    if (n === 1) {
      step1Done = true;
      saveProgress(true, false);
      updateProgress();
      setTimeout(() => {
        document.getElementById('step-2').classList.remove('locked');
        document.getElementById('btn-2').disabled = false;
      }, 600);
    } else {
      step2Done = true;
      saveProgress(true, true);
      updateProgress();
      unlockDownload();
      launchConfetti();
    }
  }

  function onAdFallback(n) {
    console.warn(`Ad ${n} fallback`);
    setTimeout(() => onAdComplete(n), 800);
  }

  function updateProgress() {
    const done = (step1Done?1:0) + (step2Done?1:0);
    document.getElementById('progress-fill').style.width  = `${done*50}%`;
    document.getElementById('progress-label').textContent = `${done}/2`;
  }

  function unlockDownload() {
    const btn = document.getElementById('btn-download');
    btn.disabled = false;
    btn.className = 'cta-btn unlocked';
    btn.innerHTML = '📥 Download Now';
    document.getElementById('success-msg').classList.add('visible');
  }

  // ── Download ─────────────────────────────────────────────────
  function downloadNow() {
    if (!step1Done || !step2Done) return;
    if (tg?.openLink) {
      tg.openLink(FILE_URL);
      setTimeout(() => tg.close(), 800);
    } else {
      window.open(FILE_URL, '_blank');
    }
  }
  document.getElementById('btn-download').addEventListener('click', downloadNow);

  // ── Confetti ─────────────────────────────────────────────────
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.style.display = 'block';
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors  = ['#d52b1e','#ffffff','#a3160c','#ff7a6e','#2b2b2b','#ffd6d2'];
    const pieces  = Array.from({length: 90}, () => ({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height - canvas.height,
      r:  Math.random() * 5 + 3,
      d:  Math.random() * 2 + 1,
      color: colors[Math.floor(Math.random()*colors.length)],
      tilt: Math.random()*10-5,
      tiltSpeed: (Math.random()*.07+.03) * (Math.random()<.5?1:-1),
    }));

    let frame = 0;
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.ellipse(p.x, p.y, p.r, p.r*0.4, p.tilt, 0, Math.PI*2);
        ctx.fill();
        p.y += p.d + frame/80;
        p.tilt += p.tiltSpeed;
        p.x += Math.sin(frame/20) * 0.5;
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random()*canvas.width; }
      });
      frame++;
      if (frame < 160) requestAnimationFrame(draw);
      else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
    }
    draw();
  }

  // ── Bootstrap ────────────────────────────────────────────────
  window.addEventListener('load', () => {
    loadFileMeta();

    // Check localStorage cache
    const cached = loadProgress();
    if (cached?.step1 && cached?.step2) {
      // Already completed within 5 min — skip ads
      step1Done = true; step2Done = true;
      showCard();
      updateProgress();
      // mark steps visually
      [1,2].forEach(n => {
        const btn  = document.getElementById(`btn-${n}`);
        const step = document.getElementById(`step-${n}`);
        btn.className = 'step-btn done-mark'; btn.textContent = '✓';
        step.classList.add('done');
        document.getElementById(`step-${n}`).classList.remove('locked');
        document.getElementById(`sub-${n}`).textContent = 'Completed ✓';
      });
      unlockDownload();
    } else {
      showCard();
      waitForTads(() => {
        initAdControllers();
        initTGBBanner();
      });
    }
  });
  </script>
