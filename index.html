<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Premium Book Access</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- ✅ تم حذف RichAds -->
    <!-- <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script> -->
    
    <script src="https://w.tads.me/widget.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        :root {
            --bg-body: #dae0e6;
            --bg-card: #ffffff;
            --text-main: #1c1c1c;
            --text-muted: #7c7c7c;
            --primary: #ff4500;
            --primary-hover: #e03d00;
            --success: #46d160;
            --success-hover: #3dc154;
            --btn-bg: #edeff1;
            --btn-text: #1c1c1c;
            --item-bg: #f8f9fa;
            --border-color: #ccc;
            --border-light: #e6e6e6;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --whatsapp-green: #25D366;
            --whatsapp-dark: #128C7E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 1px 4px var(--shadow-color);
            border: 1px solid var(--border-color);
            position: relative;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .whatsapp-banner {
            margin-bottom: 16px;
            padding: 10px;
            background: linear-gradient(135deg, var(--whatsapp-green), var(--whatsapp-dark));
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(37, 211, 102, 0.25);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            background: white;
            color: var(--whatsapp-dark);
            border: none;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
            line-height: 1.2;
        }

        .whatsapp-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
        }

        .whatsapp-btn:active {
            transform: translateY(0);
        }

        .whatsapp-icon {
            font-size: 16px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--btn-bg);
            padding: 4px 10px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 12px 14px;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            border-color: var(--primary);
        }

        .task-item.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .task-item.completed {
            border-color: var(--success);
            background: rgba(70, 209, 96, 0.08);
        }

        .task-info-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid var(--border-light);
        }

        .task-item.completed .task-icon {
            background: var(--success);
            color: white;
            border-color: var(--success-hover);
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px;
        }

        .task-reward {
            font-size: 11px;
            font-weight: 500;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .task-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 99px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .task-btn:not(:disabled):hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .task-btn:active {
            transform: translateY(0);
        }

        .task-btn.done {
            background: transparent;
            color: var(--success);
            font-size: 14px;
            pointer-events: none;
            border: 2px solid var(--success);
            border-radius: 99px;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            border-radius: 99px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .main-btn.disabled {
            background: var(--btn-bg);
            color: var(--btn-text);
            cursor: not-allowed;
            border: 1px solid var(--border-light);
        }

        .main-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 69, 0, 0.3);
            animation: pulse 2s infinite;
        }

        .main-btn.active:hover {
            background: var(--primary-hover);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 69, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 0, 0); }
        }

        .tgb-ad-wrapper {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .tgb-ad-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
            background: var(--btn-bg);
            padding: 2px 8px;
            border-radius: 4px;
        }

        #tads-container-9637 {
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #tads-container-9637:empty {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="whatsapp-banner">
            <a href="https://whatsapp.com/channel/0029VaC7Weq29753hpcggW2A" 
               class="whatsapp-btn" 
               onclick="joinWhatsappChannel(event)">
                <span class="whatsapp-icon">📚</span>
                <span>Join Our WhatsApp Channel</span>
            </a>
        </div>

        <div class="header-top">
            <h1>Getting Started</h1>
            <span class="progress-text" id="progress-text">0/2</span>
        </div>
        <p class="subtitle">Complete the tasks below to get your free book link.</p>

        <div class="task-list">
            <!-- ✅ المهمة الأولى: HilltopAds Popup -->
            <div class="task-item" id="task1">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon1">🎬</div>
                    <div>
                        <div class="task-title">Watch First Ad (Popup)</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad1" onclick="watchAd(1)">Start</button>
            </div>

            <div class="task-item disabled" id="task2">
                <div class="task-info-wrapper">
                    <div class="task-icon" id="icon2">🎬</div>
                    <div>
                        <div class="task-title">Watch Second Ad (Tads)</div>
                        <div class="task-reward">⭐ Required step</div>
                    </div>
                </div>
                <button class="task-btn" id="btn-ad2" onclick="watchAd(2)" disabled>Start</button>
            </div>
        </div>

        <button class="main-btn disabled" id="btn-final" onclick="goToBook()" disabled>
            🔒 Complete tasks to unlock
        </button>

        <div class="tgb-ad-wrapper">
            <span class="tgb-ad-label">Sponsored</span>
            <div id="tads-container-9637"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || null;
        if (tg) { tg.ready(); tg.expand(); }

        // ✅ HilltopAds Direct Link
        const HILLTOPADS_LINK = "https://fluffy-machine.com/hy0AJ8";
        
        const TGB_WIDGET_ID = "9637";
        const AD_TYPE_TGB = "static";
        
        let fullscreenAdController = null;
        let tgbAdController = null;
        let currentStep = 1;
        let isAdPlaying = false;
        let hilltopPopup = null;

        const WHATSAPP_CHANNEL_URL = "https://whatsapp.com/channel/0029VaC7Weq29753hpcggW2A";

        function getBookUrl() {
            const code = tg?.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp');
            if (!code) return WHATSAPP_CHANNEL_URL;
            try {
                const decoded = atob(code.replace(/-/g, '+').replace(/_/g, '/'));
                return decoded.startsWith('http') ? decoded : WHATSAPP_CHANNEL_URL;
            } catch (e) { return WHATSAPP_CHANNEL_URL; }
        }
        const BOOK_URL = getBookUrl();

        window.addEventListener('load', () => {
            initTGBAd();
        });

        // ✅ تم حذف initTadsFullscreen() الخاصة بـ RichAds

        function initTGBAd() {
            const adsNotFoundCallback = () => {
                console.log('TGB: No ads found to show');
                const container = document.getElementById(`tads-container-${TGB_WIDGET_ID}`);
                if (container) container.style.display = 'none';
            };

            function initTGBController() {
                if (!window.tads || typeof window.tads.init !== 'function') return;
                
                tgbAdController = window.tads.init({
                    widgetId: TGB_WIDGET_ID,
                    type: AD_TYPE_TGB,
                    debug: false,
                    onAdsNotFound: adsNotFoundCallback
                });

                if (tgbAdController && typeof tgbAdController.loadAd === 'function') {
                    tgbAdController.loadAd()
                        .then(() => tgbAdController.showAd())
                        .catch((err) => {
                            console.log("TGB Ad load error:", err);
                            adsNotFoundCallback();
                        });
                }
            }

            if (window.tads && window.tads.init) {
                initTGBController();
            } else {
                let tadsInterval = setInterval(() => {
                    if (window.tads && window.tads.init) {
                        clearInterval(tadsInterval);
                        initTGBController();
                    }
                }, 100);
            }
        }

        function watchAd(stepNumber) {
            if (stepNumber !== currentStep || isAdPlaying) return;
            isAdPlaying = true;
            let btn = document.getElementById(`btn-ad${stepNumber}`);
            btn.innerText = "⏳ Wait";
            btn.disabled = true;

            if (stepNumber === 1) {
                // ✅ فتح HilltopAds كنافذة منبثقة
                openHilltopAdsPopup();
            } else if (stepNumber === 2) {
                if (fullscreenAdController) {
                    fullscreenAdController.showAd().catch((err) => {
                        console.error("Failed to display fullscreen ad:", err);
                        handleAdFallback();
                    });
                } else {
                    handleAdFallback();
                }
            }
        }

        // ✅ دالة جديدة لفتح HilltopAds Popup
        function openHilltopAdsPopup() {
            try {
                // فتح النافذة المنبثقة
                hilltopPopup = window.open(HILLTOPADS_LINK, '_blank', 'width=400,height=600');
                
                // التحقق مما إذا تم حظر النافذة المنبثقة
                if (!hilltopPopup || hilltopPopup.closed || typeof hilltopPopup.closed === 'undefined') {
                    console.warn('Popup blocked, using fallback');
                    handlePopupFallback();
                    return;
                }

                // مراقبة إغلاق النافذة لتفعيل الخطوة التالية
                const checkClosed = setInterval(() => {
                    if (hilltopPopup && hilltopPopup.closed) {
                        clearInterval(checkClosed);
                        console.log('HilltopAds popup closed');
                        handleAdSuccess();
                    }
                }, 1000);

                // فاصل زمني احتياطي في حال لم يتم اكتشاف الإغلاق
                setTimeout(() => {
                    if (isAdPlaying && currentStep === 1) {
                        console.log('HilltopAds: Timeout fallback');
                        handleAdSuccess();
                    }
                }, 15000);

            } catch (e) {
                console.error('Error opening HilltopAds popup:', e);
                handlePopupFallback();
            }
        }

        function handlePopupFallback() {
            // فallback في حال فشل فتح النافذة
            setTimeout(() => {
                if (isAdPlaying && currentStep === 1) {
                    handleAdSuccess();
                }
            }, 3000);
        }

        function handleAdSuccess() {
            if (!isAdPlaying) return;
            isAdPlaying = false;
            
            let currentBtn = document.getElementById(`btn-ad${currentStep}`);
            let currentItem = document.getElementById(`task${currentStep}`);
            let currentIcon = document.getElementById(`icon${currentStep}`);

            currentBtn.innerText = "✓";
            currentBtn.classList.add('done');
            currentItem.classList.add('completed');
            currentIcon.innerText = "✓";

            document.getElementById('progress-text').innerText = `${currentStep}/2`;
            currentStep++;

            if (currentStep === 2) {
                let nextBtn = document.getElementById('btn-ad2');
                let nextItem = document.getElementById('task2');
                nextItem.classList.remove('disabled');
                nextBtn.disabled = false;
            } else if (currentStep > 2) {
                let finalBtn = document.getElementById('btn-final');
                finalBtn.classList.remove('disabled');
                finalBtn.classList.add('active');
                finalBtn.disabled = false;
                finalBtn.innerHTML = "🚀 Download Book Now";
            }
        }

        function handleAdFallback() {
            console.warn("Using fallback skip due to unavailable ad or error");
            setTimeout(() => {
                handleAdSuccess();
            }, 1500);
        }

        function resetButtonState() {
            isAdPlaying = false;
            let btn = document.getElementById(`btn-ad${currentStep}`);
            if (btn) {
                btn.innerText = "Start";
                btn.disabled = false;
            }
        }

        function joinWhatsappChannel(event) {
            event.preventDefault();
            if (tg?.openLink) {
                tg.openLink(WHATSAPP_CHANNEL_URL);
            } else {
                window.open(WHATSAPP_CHANNEL_URL, '_blank');
            }
        }

        function goToBook() {
            if (tg?.openLink) {
                tg.openLink(BOOK_URL);
                setTimeout(() => tg.close(), 1000);
            } else {
                window.location.href = BOOK_URL;
            }
        }
    </script>
</body>
</html>
